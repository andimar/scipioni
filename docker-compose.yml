services:
  app:
    build:
      context: .
      dockerfile: infra/docker/php/Dockerfile
    container_name: scipioni-app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - backend/.env.docker
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scipioni-network

  queue:
    build:
      context: .
      dockerfile: infra/docker/php/Dockerfile
    container_name: scipioni-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=1 --timeout=90
    env_file:
      - backend/.env.docker
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scipioni-network

  nginx:
    image: nginx:1.27-alpine
    container_name: scipioni-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - scipioni-network

  frontend-demo:
    image: nginx:1.27-alpine
    container_name: scipioni-frontend-demo
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./frontend/app/build/web:/usr/share/nginx/html:ro
      - ./infra/docker/frontend-demo/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - scipioni-network

  admin:
    build:
      context: .
      dockerfile: infra/docker/admin/Dockerfile
    container_name: scipioni-admin
    restart: unless-stopped
    environment:
      NUXT_ADMIN_API_BASE: http://nginx/api/admin
      NUXT_PUBLIC_ADMIN_API_BASE: http://localhost:8080/api/admin
      NUXT_PUBLIC_ADMIN_APP_NAME: Scipioni Staff Console
    ports:
      - "8092:3000"
    depends_on:
      - nginx
    networks:
      - scipioni-network

  mysql:
    image: mysql:8.4
    container_name: scipioni-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: scipioni_club
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: scipioni
      MYSQL_PASSWORD: scipioni
    ports:
      - "3307:3306"
    volumes:
      - ./infra/data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - scipioni-network

  redis:
    image: redis:7.4-alpine
    container_name: scipioni-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - scipioni-network

  adminer:
    image: adminer:5.4.2
    container_name: scipioni-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - scipioni-network

networks:
  scipioni-network:
    driver: bridge
