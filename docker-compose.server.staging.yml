services:
  nginx:
    ports: !reset []

  frontend-demo:
    image: scipioni-frontend-demo:staging
    build:
      context: .
      dockerfile: infra/docker/frontend-demo/Dockerfile
      args:
        SCIPIONI_API_BASE_URL: https://api-staging.scipioni.brane.it/api/v1
    volumes: !reset []
    ports: !reset []

  mysql:
    ports: !reset []

  adminer:
    profiles: ["local-only"]
    ports: !reset []
